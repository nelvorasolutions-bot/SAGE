name: Build Water Buddy APK

# Runs automatically every time files are pushed to the repo,
# and can also be started by hand from the Actions tab (Run workflow).
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew runnable
        run: chmod +x ./gradlew

      - name: Build the debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload the APK so you can download it
        uses: actions/upload-artifact@v4
        with:
          name: water-buddy-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
